apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx-ingress
  namespace: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /

spec:
  ingressClassName: nginx

  rules:
  - http:
      paths:
      - path: /nginx
        pathType: Prefix
        backend:
          service:
            name: nginx-service
            port:
              number: 80
      - path: /netflix
        pathType: Prefix
        backend:
          service:
            name: react-app
            port:
              number: 80
      - path: /django
        pathType: Prefix
        backend:
          service:
            name: django-app
            port:
              number: 80
